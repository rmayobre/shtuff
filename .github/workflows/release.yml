name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate bash syntax
        run: |
          bash -n tests/file_operations_test.sh
          bash -n tests/dry_run_test.sh

      - name: Run file operations tests
        run: bash file_operations_test.sh
        working-directory: ${{ github.workspace }}/tests

      - name: Run dry-run tests
        run: bash tests/dry_run_test.sh

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build tarball
        run: |
          tar -czf "shtuff-${{ steps.version.outputs.VERSION }}.tar.gz" \
            shtuff.sh \
            README.md \
            src/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          files: shtuff-${{ steps.version.outputs.VERSION }}.tar.gz
